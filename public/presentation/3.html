<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 3 - Live AQI Tracker (Jashore)</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800;900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: '#0d9488', warning: '#f59e0b', danger: '#f43f5e', lightBg: '#fcfdfd' }, 
                    fontFamily: { eng: ['Outfit', 'sans-serif'], bn: ['Hind Siliguri', 'sans-serif'] } 
                } 
            }
        }
    </script>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background-color: #ffffff; font-family: 'Hind Siliguri', sans-serif; color: #0f172a; }
        
        .bg-canvas {
            position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 0% 0%, rgba(13, 148, 136, 0.03) 0%, transparent 40%),
                radial-gradient(circle at 100% 100%, rgba(2, 132, 199, 0.03) 0%, transparent 40%),
                #ffffff;
            z-index: -1;
        }

        .slide-container { width: 100%; height: 100%; padding: 80px 120px; display: flex; flex-direction: column; justify-content: center; }

        .aqi-card {
            background: #ffffff;
            border-radius: 45px;
            border: 1px solid rgba(0,0,0,0.04);
            box-shadow: 0 40px 100px -20px rgba(0,0,0,0.05);
            padding: 60px;
            display: grid;
            grid-template-columns: 1.2fr 0.8fr;
            gap: 60px;
            align-items: center;
            position: relative;
            overflow: hidden;
        }

        .ring-container { position: relative; width: 320px; height: 320px; display: flex; align-items: center; justify-content: center; }
        #aqi-ring { transition: stroke-dashoffset 1.5s cubic-bezier(0.4, 0, 0.2, 1), stroke 0.5s ease; }

        /* Minimalist Source Toggle Switch */
        .source-switch {
            position: relative;
            display: inline-block;
            width: 36px;
            height: 20px;
        }
        .source-switch input { opacity: 0; width: 0; height: 0; }
        .slider {
            position: absolute; cursor: pointer; inset: 0;
            background-color: #e2e8f0;
            transition: .4s; border-radius: 34px;
        }
        .slider:before {
            position: absolute; content: "";
            height: 14px; width: 14px; left: 3px; bottom: 3px;
            background-color: white; transition: .4s; border-radius: 50%;
        }
        input:checked + .slider { background-color: #0d9488; }
        input:checked + .slider:before { transform: translateX(16px); }

        .live-dot { width: 10px; height: 10px; background: #22c55e; border-radius: 50%; position: relative; }
        .live-dot::after { content: ''; position: absolute; inset: -4px; border-radius: 50%; border: 2px solid #22c55e; animation: pulse 2s infinite; }
        @keyframes pulse { 0% { transform: scale(1); opacity: 1; } 100% { transform: scale(2.5); opacity: 0; } }
    </style>
</head>
<body class="font-bn">

    <div class="bg-canvas"></div>

    <div class="slide-container">
        
        <div class="flex justify-between items-end mb-12">
            <div>
                <span class="font-eng font-bold text-primary tracking-[4px] text-sm uppercase block mb-3">Environmental Intelligence</span>
                <h2 class="font-eng font-black text-6xl text-slate-900 leading-none tracking-tighter uppercase">Live AQI <span class="text-primary">Data.</span></h2>
            </div>
            <div class="bg-slate-50 px-6 py-3 rounded-2xl border border-slate-100 flex items-center gap-4">
                <div class="live-dot" id="status-dot"></div>
                <span class="font-eng font-bold text-slate-500 text-xs tracking-widest uppercase" id="feed-status">Satellite Active</span>
            </div>
        </div>

        <div class="aqi-card">
            <div class="info-side">
                <div class="inline-block bg-primary/5 text-primary font-eng font-black text-xs px-4 py-2 rounded-lg tracking-widest uppercase mb-6">
                    Current Location: Jashore City
                </div>
                <h3 class="font-eng font-black text-7xl text-slate-900 mb-4 tracking-tight">JASHORE <br><span class="text-slate-400">CITY Area.</span></h3>
                <p class="text-slate-500 text-2xl font-light leading-relaxed max-w-lg mb-10">
                    আশপাশের বায়ুমণ্ডলীয় স্টেশন এবং স্যাটেলাইট মডেল থেকে প্রাপ্ত যশোরের লাইভ ডাটা মনিটর করা হচ্ছে।
                </p>
                
                <div class="flex gap-4">
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100 flex items-center gap-4">
                        <div>
                            <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Engine Source</p>
                            <p class="font-eng font-bold text-slate-700 text-sm" id="source-name">Open-Meteo</p>
                        </div>
                        <label class="source-switch">
                            <input type="checkbox" id="engine-toggle" onchange="toggleEngine()">
                            <span class="slider"></span>
                        </label>
                    </div>
                    <div class="bg-slate-50 p-4 rounded-3xl border border-slate-100">
                        <p class="text-[9px] text-slate-400 font-bold uppercase tracking-widest mb-0.5">Status</p>
                        <p class="font-eng font-bold text-slate-700 text-sm">Verified Live</p>
                    </div>
                </div>
            </div>

            <div class="visual-side flex flex-col items-center">
                <div class="ring-container">
                    <svg class="absolute inset-0 w-full h-full -rotate-90" viewBox="0 0 100 100">
                        <circle cx="50" cy="50" r="45" stroke="#f1f5f9" stroke-width="8" fill="transparent" />
                        <circle id="aqi-ring" cx="50" cy="50" r="45" stroke="#0d9488" stroke-width="8" fill="transparent" stroke-dasharray="283" stroke-dashoffset="283" stroke-linecap="round" />
                    </svg>
                    <div class="text-center z-10 flex flex-col items-center justify-center">
                        <span class="font-eng text-8xl font-black text-slate-900 tracking-tighter" id="aqi-value">--</span>
                        <span class="font-eng font-bold text-primary text-sm tracking-[3px] uppercase mt-2" id="aqi-text">Syncing</span>
                        <span class="font-eng text-[10px] text-slate-400 font-bold uppercase mt-1">US AQI Index</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        lucide.createIcons();

        // Config - Updated for Jashore
        const JASHORE_LAT = 23.1664;
        const JASHORE_LON = 89.2082;
        const IQAIR_KEY = '4ef914ff-b149-479b-9e23-6fe1df6c40b9';

        let currentEngine = 'meteo'; // default
        let isFetching = false;

        async function fetchAQI() {
            if(isFetching) return;
            isFetching = true;
            
            try {
                let aqiScore = 0;
                
                if (currentEngine === 'meteo') {
                    const res = await fetch(`https://air-quality-api.open-meteo.com/v1/air-quality?latitude=${JASHORE_LAT}&longitude=${JASHORE_LON}&current=us_aqi`);
                    const data = await res.json();
                    aqiScore = data.current.us_aqi;
                } else {
                    const res = await fetch(`https://api.airvisual.com/v2/nearest_city?lat=${JASHORE_LAT}&lon=${JASHORE_LON}&key=${IQAIR_KEY}`);
                    const data = await res.json();
                    aqiScore = data.data.current.pollution.aqius;
                }
                
                updateUI(aqiScore);
            } catch (error) {
                console.error("Fetch Error:", error);
                document.getElementById('aqi-text').innerText = "Offline";
            } finally {
                isFetching = false;
            }
        }

        function toggleEngine() {
            const toggle = document.getElementById('engine-toggle');
            const nameEl = document.getElementById('source-name');
            
            // UI Reset
            document.getElementById('aqi-value').innerText = "--";
            document.getElementById('aqi-text').innerText = "Syncing...";
            
            if (toggle.checked) {
                currentEngine = 'iqair';
                nameEl.innerText = "IQAir Global";
            } else {
                currentEngine = 'meteo';
                nameEl.innerText = "Open-Meteo";
            }
            
            fetchAQI();
        }

        function updateUI(score) {
            const valEl = document.getElementById('aqi-value');
            const txtEl = document.getElementById('aqi-text');
            const ring = document.getElementById('aqi-ring');
            const dot = document.getElementById('status-dot');
            
            // Count animation
            let curr = 0;
            const step = score / 40;
            const timer = setInterval(() => {
                curr += step;
                if(curr >= score) { curr = score; clearInterval(timer); }
                valEl.innerText = Math.round(curr);
            }, 20);

            // Level Logic
            let color = '#0d9488'; let status = 'Good';
            if(score > 300) { color = '#7e22ce'; status = 'Hazardous'; }
            else if(score > 200) { color = '#9333ea'; status = 'Very Unhealthy'; }
            else if(score > 150) { color = '#f43f5e'; status = 'Unhealthy'; }
            else if(score > 100) { color = '#f59e0b'; status = 'Sensitive'; }
            else if(score > 50) { color = '#0ea5e9'; status = 'Moderate'; }

            txtEl.innerText = status;
            txtEl.style.color = color;
            ring.style.stroke = color;
            dot.style.background = color;
            
            // Ring
            const offset = 283 - (Math.min(score, 300) / 300) * 283;
            ring.style.strokeDashoffset = offset;
        }

        // Initial Load
        window.onload = fetchAQI;
    </script>
</body>
</html>
