<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 6 - Interactive Simulator</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800;900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: '#0d9488', darkSlate: '#0f172a', danger: '#f43f5e' }, 
                    fontFamily: { eng: ['Outfit', 'sans-serif'], bn: ['Hind Siliguri', 'sans-serif'] } 
                } 
            }
        }
    </script>
    <style>
        /* 1. RESET & BASE STYLES */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background-color: #ffffff; font-family: 'Hind Siliguri', sans-serif; color: #0f172a; }
        
        .bg-canvas {
            position: absolute; inset: 0;
            background: radial-gradient(circle at 100% 0%, rgba(13, 148, 136, 0.05) 0%, transparent 40%), #ffffff;
            z-index: -1;
        }

        .slide-container { width: 100%; height: 100%; padding: 40px 60px; display: flex; flex-direction: column; }

        /* 2. Simulation Viewport */
        .sim-box {
            flex: 1; position: relative; background: #f8fafc; border-radius: 40px; overflow: hidden;
            border: 1px solid rgba(0,0,0,0.05); box-shadow: 0 40px 100px -20px rgba(0,0,0,0.05);
        }

        /* 3. Environment Layers */
        .sim-bg { position: absolute; inset: 0; background-image: url('https://saifulinfo.com/imagelink/uploads/IMG_692b51ea8186d2.29615030.jpg'); background-size: cover; background-position: center 80%; transition: filter 1.5s ease; z-index: 0; }
        .night-filter { filter: brightness(0.4) contrast(1.2) saturate(0.8) hue-rotate(200deg); }
        
        .road-overlay { position: absolute; bottom: 0; left: 0; width: 100%; height: 35%; background: linear-gradient(to top, rgba(13,148,136,0.2), transparent); opacity: 0; transition: opacity 1s ease; z-index: 1; }

        /* 4. Particles */
        .toxic-p { position: absolute; width: 22px; height: 22px; background: radial-gradient(circle, #f43f5e 0%, #9f1239 80%); border-radius: 50%; box-shadow: 0 0 10px #f43f5e; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .safe-p { position: absolute; width: 20px; height: 20px; background: radial-gradient(circle, #ccfbf1 0%, #0d9488 80%); border-radius: 50%; box-shadow: 0 0 12px #0d9488; z-index: 10; display: flex; align-items: center; justify-content: center; }
        .p-text { font-size: 9px; font-weight: 900; color: white; font-family: sans-serif; }

        @keyframes neutralize { 0% { transform: scale(1); opacity: 1; } 100% { transform: translateY(-80px) scale(0.3); opacity: 0; } }
        .safe-anim { animation: neutralize 1.5s ease-out forwards; }

        /* 5. Control Sidebar Styling */
        .glass-btn { transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); border: 1px solid rgba(0,0,0,0.05); }
        .active-day { background: #facc15 !important; color: #000 !important; box-shadow: 0 10px 20px rgba(250,204,21,0.3); border-color: #facc15; }
        .active-night { background: #1e293b !important; color: #fff !important; box-shadow: 0 10px 20px rgba(30,41,59,0.3); border-color: #1e293b; }
    </style>
</head>
<body class="font-bn">

    <div class="bg-canvas"></div>

    <div class="slide-container">
        
        <div class="flex justify-between items-center mb-8">
            <div>
                <span class="font-eng font-bold text-primary tracking-[4px] text-xs uppercase block mb-1">Laboratory Simulation</span>
                <h2 class="font-eng font-black text-5xl text-slate-900 leading-none tracking-tight uppercase">REAL-TIME <span class="text-primary">PROCESS.</span></h2>
            </div>
            
            <div class="flex gap-4">
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex flex-col items-center min-w-[140px] shadow-sm">
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Efficiency</span>
                    <span class="font-eng font-black text-2xl text-primary" id="eff-rate">0%</span>
                </div>
                <div class="bg-white p-4 rounded-2xl border border-slate-100 flex flex-col items-center min-w-[140px] shadow-sm">
                    <span class="text-[10px] text-slate-400 font-bold uppercase tracking-widest">Cleaned</span>
                    <span class="font-eng font-black text-2xl text-slate-800" id="nox-count">0</span>
                </div>
            </div>
        </div>

        <div class="grid grid-cols-12 gap-8 flex-1 min-h-0">
            
            <div class="col-span-3 flex flex-col gap-6">
                <div class="bg-slate-50/50 p-8 rounded-[35px] border border-slate-100 flex-1 flex flex-col justify-center gap-6">
                    <p class="text-slate-500 text-sm font-medium mb-2">পরিবেশ পরিবর্তন করে ব্লকের কার্যকারিতা দেখুন:</p>
                    
                    <button onclick="setMode('day')" id="day-btn" class="glass-btn w-full py-6 rounded-2xl bg-white font-eng font-black text-sm tracking-widest flex items-center justify-center gap-3">
                        <i data-lucide="sun" class="w-5 h-5"></i> DAY MODE
                    </button>

                    <button onclick="setMode('night')" id="night-btn" class="glass-btn w-full py-6 rounded-2xl bg-white font-eng font-black text-sm tracking-widest flex items-center justify-center gap-3">
                        <i data-lucide="moon" class="w-5 h-5"></i> NIGHT MODE
                    </button>

                    <div class="mt-4 pt-6 border-t border-slate-200">
                        <div class="flex justify-between text-[10px] font-bold text-slate-400 uppercase tracking-widest mb-3">
                            <span>UV Intensity</span>
                            <span id="uv-val" class="text-slate-600">0%</span>
                        </div>
                        <div class="h-2 w-full bg-slate-200 rounded-full overflow-hidden">
                            <div id="uv-bar" class="h-full bg-gradient-to-r from-orange-400 to-yellow-300 w-0 transition-all duration-1000"></div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-9 sim-box">
                <div id="sim-bg-layer" class="sim-bg night-filter"></div>
                <div id="road-glow-layer" class="road-overlay"></div>
                
                <div id="sim-car" class="absolute bottom-[10%] -left-[400px] z-30">
                    <img src="https://static.vecteezy.com/system/resources/thumbnails/044/012/937/small/side-view-white-suv-car-png.png" class="w-96 h-auto drop-shadow-2xl">
                    <div id="exhaust" class="absolute bottom-6 left-10 w-2 h-2"></div>
                </div>

                <div id="particle-canvas" class="absolute inset-0 z-20 pointer-events-none"></div>

                <div class="absolute top-8 left-8 z-40">
                    <div class="bg-white/90 backdrop-blur px-5 py-3 rounded-full border border-white shadow-xl flex items-center gap-3">
                        <div id="indicator" class="w-3 h-3 rounded-full bg-danger animate-pulse"></div>
                        <span class="font-eng font-black text-[10px] tracking-widest text-slate-800 uppercase" id="status-text">Coating: Inactive</span>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();
        
        let currentMode = 'night';
        let neutralizedCount = 0;
        let efficiency = 0;
        const car = document.getElementById('sim-car');
        const canvas = document.getElementById('particle-canvas');

        // Mode Switching
        function setMode(mode) {
            currentMode = mode;
            const bg = document.getElementById('sim-bg-layer');
            const glow = document.getElementById('road-glow-layer');
            const uvBar = document.getElementById('uv-bar');
            const uvVal = document.getElementById('uv-val');
            const ind = document.getElementById('indicator');
            const statText = document.getElementById('status-text');

            if(mode === 'day') {
                bg.classList.remove('night-filter');
                glow.style.opacity = '1';
                uvBar.style.width = '100%';
                uvVal.innerText = '100% (High)';
                ind.className = 'w-3 h-3 rounded-full bg-primary shadow-[0_0_10px_#0d9488]';
                statText.innerText = 'Coating: Active';
                document.getElementById('day-btn').classList.add('active-day');
                document.getElementById('night-btn').classList.remove('active-night');
            } else {
                bg.classList.add('night-filter');
                glow.style.opacity = '0';
                uvBar.style.width = '5%';
                uvVal.innerText = '0%';
                ind.className = 'w-3 h-3 rounded-full bg-danger animate-pulse';
                statText.innerText = 'Coating: Inactive';
                document.getElementById('night-btn').classList.add('active-night');
                document.getElementById('day-btn').classList.remove('active-day');
            }
        }

        // Efficiency Tracker
        setInterval(() => {
            if(currentMode === 'day' && efficiency < 98) efficiency += 2;
            else if(currentMode === 'night' && efficiency > 0) efficiency -= 3;
            if(efficiency < 0) efficiency = 0;
            document.getElementById('eff-rate').innerText = efficiency + "%";
        }, 50);

        // GSAP Car Animation
        gsap.to(car, { x: 1500, duration: 5, repeat: -1, ease: "none" });

        // Particle System
        function createParticles() {
            const carRect = car.getBoundingClientRect();
            const simRect = document.querySelector('.sim-box').getBoundingClientRect();
            
            if(carRect.left > simRect.left - 100 && carRect.left < simRect.right) {
                const x = carRect.left - simRect.left + 50;
                const y = simRect.height - 120;

                const p = document.createElement('div');
                p.className = 'toxic-p';
                p.innerHTML = '<span class="p-text">NOx</span>';
                p.style.left = x + 'px';
                p.style.top = y + 'px';
                canvas.appendChild(p);

                let velX = -1 - Math.random() * 2;
                let velY = -1 + Math.random() * 2;
                let posX = x;
                let posY = y;

                function move() {
                    if(!p.parentNode) return;
                    velY += 0.05; // gravity-ish
                    posX += velX;
                    posY += velY;
                    p.style.left = posX + 'px';
                    p.style.top = posY + 'px';

                    // Collision with Road (Reaction)
                    if(currentMode === 'day' && posY > simRect.height - 60) {
                        p.className = 'safe-p safe-anim';
                        p.innerHTML = '<span class="p-text">NO₃⁻</span>';
                        neutralizedCount++;
                        document.getElementById('nox-count').innerText = neutralizedCount.toLocaleString();
                        setTimeout(() => p.remove(), 1400);
                        return;
                    }

                    if(posY > simRect.height || posX < -50) { p.remove(); return; }
                    requestAnimationFrame(move);
                }
                requestAnimationFrame(move);
            }
        }

        setInterval(createParticles, 120);
        setMode('night'); // Start with Night Mode
    </script>
</body>
</html>
