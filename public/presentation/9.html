<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 9 - Environmental Impact</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800;900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <style>
        /* ==========================================
           1. RESET & BASE STYLES
           ========================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html { 
            width: 100vw; height: 100vh; overflow: hidden; 
            background-color: #ffffff; 
            font-family: 'Hind Siliguri', sans-serif;
            -webkit-font-smoothing: antialiased;
        }

        .bg-canvas {
            position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 0% 100%, rgba(13, 148, 136, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 100% 0%, rgba(2, 132, 199, 0.03) 0%, transparent 40%),
                #ffffff;
            z-index: -1;
        }

        /* ==========================================
           2. LAYOUT DESIGN
           ========================================== */
        .slide-container {
            width: 100%; height: 100%;
            display: flex; align-items: center;
            padding: 0 100px;
            gap: 80px;
        }

        .content-side { flex: 1.1; display: flex; flex-direction: column; justify-content: center; }
        .visual-side { flex: 0.9; position: relative; }

        /* ==========================================
           3. TYPOGRAPHY & ELEMENTS
           ========================================== */
        .section-label {
            font-family: 'Outfit', sans-serif;
            font-weight: 700; color: #0d9488;
            letter-spacing: 4px; font-size: 14px;
            margin-bottom: 20px; display: block;
            text-transform: uppercase;
        }

        h2 {
            font-family: 'Outfit', sans-serif;
            font-size: 65px; font-weight: 900;
            color: #0f172a; line-height: 1.1;
            letter-spacing: -2px; margin-bottom: 40px;
        }
        h2 span { color: #0d9488; }

        /* Impact Statement */
        .impact-statement {
            font-size: 32px; font-weight: 300;
            color: #64748b; line-height: 1.5;
            margin-bottom: 50px;
        }
        .impact-statement strong { color: #0f172a; font-weight: 700; }

        /* Counter Card */
        .impact-card {
            background: #ffffff;
            padding: 40px;
            border-radius: 40px;
            border: 1px solid rgba(13, 148, 136, 0.1);
            box-shadow: 0 30px 60px rgba(13, 148, 136, 0.08);
            display: flex; align-items: center; gap: 35px;
            position: relative; overflow: hidden;
        }
        .impact-card::after {
            content: ''; position: absolute; right: -20px; bottom: -20px;
            font-family: 'Font Awesome 6 Free'; content: '\f1bb'; font-weight: 900;
            font-size: 150px; color: rgba(13, 148, 136, 0.03); z-index: 0;
        }

        .big-num {
            font-family: 'Outfit', sans-serif;
            font-size: 100px; font-weight: 900;
            color: #0d9488; line-height: 1;
            position: relative; z-index: 1;
        }

        .card-text { position: relative; z-index: 1; }
        .card-text h3 { font-size: 26px; color: #0f172a; font-weight: 800; margin-bottom: 5px; }
        .card-text p { color: #64748b; font-size: 18px; }

        /* Visual Image */
        .tree-visual {
            width: 100%; height: 500px;
            object-fit: cover; border-radius: 50px;
            box-shadow: 0 40px 80px rgba(0,0,0,0.1);
        }
    </style>
</head>
<body>

    <div class="bg-canvas"></div>

    <div class="slide-container">
        
        <div class="content-side">
            <span class="section-label">Environmental Impact</span>
            <h2>NATURE-TECH <span>SYNERGY.</span></h2>
            
            <p class="impact-statement">
                যদি আমরা শহরের মাত্র <strong>১ কিলোমিটার</strong> রাস্তার ফুটপাতে এই Eco-Block ব্যবহার করি...
            </p>

            <div class="impact-card">
                <div class="big-num">204</div>
                <div class="card-text">
                    <h3>Trees Equivalent</h3>
                    <p>এটি প্রায় ২০৪টি পূর্ণবয়স্ক গাছের সমান বাতাস পরিশোধন করার ক্ষমতা রাখে।</p>
                </div>
            </div>
        </div>

        <div class="visual-side">
            <img src="https://images.unsplash.com/photo-1513836279014-a89f7a76ae86?auto=format&fit=crop&w=800&q=80" 
                 alt="Green Forest Impact" class="tree-visual">
        </div>

    </div>

</body>
</html>
