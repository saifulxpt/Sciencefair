name: Deploy to VPS

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Generate Prisma Client
        env:
          DATABASE_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
        run: npx prisma generate

      - name: Build Application
        env:
          DATABASE_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
        run: |
          npm run build
          mkdir -p out_deploy
          cp -r .next/standalone/. out_deploy/
          cp -r public out_deploy/public
          mkdir -p out_deploy/.next
          cp -r .next/static out_deploy/.next/static
          cp nginx-site.conf out_deploy/


      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "out_deploy/*"
          target: "/var/www/airpurifying-concrete/"
          strip_components: 1

      - name: Set up Server and Start PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Install Node.js if not installed
            if ! command -v node &> /dev/null
            then
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get install -y nodejs
            fi

            # Install PM2 if not installed
            if ! command -v pm2 &> /dev/null
            then
                sudo npm install -g pm2
            fi

            cd /var/www/airpurifying-concrete/

            # Create .env file from GitHub Secrets
            echo "DATABASE_URL=\"${{ secrets.DATABASE_URL }}\"" > .env
            echo "DIRECT_URL=\"${{ secrets.DIRECT_URL }}\"" >> .env

            # Fix permissions
            chown -R www-data:www-data /var/www/airpurifying-concrete/ 2>/dev/null || true
            chmod -R 775 /var/www/airpurifying-concrete/ 2>/dev/null || true

            # Clean up old nginx site enabled files to prevent conflicts
            rm -f /etc/nginx/sites-enabled/*

            if [ -f /etc/letsencrypt/live/server.saifulinfo.com/fullchain.pem ]; then
                echo "SSL Certificate exists. Applying HTTPS Nginx config..."
                cp /var/www/airpurifying-concrete/nginx-site.conf /etc/nginx/sites-available/airpurifying-concrete
                ln -sf /etc/nginx/sites-available/airpurifying-concrete /etc/nginx/sites-enabled/airpurifying-concrete
            else
                echo "SSL Certificate not found. Applying temporary HTTP Nginx config..."
                cat > /etc/nginx/sites-available/airpurifying-concrete << 'NGINXEOF'
server {
    listen 80;
    listen [::]:80;
    server_name server.saifulinfo.com 160.25.226.152;
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
NGINXEOF
                ln -sf /etc/nginx/sites-available/airpurifying-concrete /etc/nginx/sites-enabled/airpurifying-concrete
            fi

            # Restart PM2 with new files
            pm2 stop next-app 2>/dev/null || true
            pm2 delete next-app 2>/dev/null || true
            pm2 start server.js --name "next-app"
            pm2 save

            # Restart nginx
            nginx -t && systemctl restart nginx
            
            echo "=== DEPLOYMENT COMPLETE ==="
            echo "PM2 Status:"
            pm2 list
            echo "Files in deploy dir:"
            ls -la /var/www/airpurifying-concrete/

