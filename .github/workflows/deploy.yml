name: Deploy to VPS

on:
  push:
    branches:
      - master
      - main

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm ci || npm install

      - name: Generate Prisma Client
        env:
          DATABASE_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
        run: npx prisma generate

      - name: Build Application
        env:
          DATABASE_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
          DIRECT_URL: "postgresql://dummy:dummy@dummy:5432/dummy"
        run: |
          npm run build
          mkdir -p out_deploy
          cp -r .next/standalone/. out_deploy/
          cp -r public out_deploy/public
          mkdir -p out_deploy/.next
          cp -r .next/static out_deploy/.next/static

      - name: Deploy to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: "out_deploy/*"
          target: "/var/www/airpurifying-concrete/"
          strip_components: 1

      - name: Set up Server and Start PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            # Install Node.js if not installed
            if ! command -v node &> /dev/null
            then
                curl -fsSL https://deb.nodesource.com/setup_20.x | sudo -E bash -
                sudo apt-get install -y nodejs
            fi

            # Install PM2 if not installed
            if ! command -v pm2 &> /dev/null
            then
                sudo npm install -g pm2
            fi

            cd /var/www/airpurifying-concrete/

            # Create .env file from GitHub Secrets
            echo 'DATABASE_URL="${{ secrets.DATABASE_URL }}"' > .env
            echo 'DIRECT_URL="${{ secrets.DIRECT_URL }}"' >> .env

            # Fix permissions
            chown -R www-data:www-data /var/www/airpurifying-concrete/ || true
            chmod -R 775 /var/www/airpurifying-concrete/ || true

            # Start Next.js server on port 3000
            pm2 restart next-app || pm2 start server.js --name "next-app"
            pm2 save

            # Restart Nginx
            sudo systemctl restart nginx
