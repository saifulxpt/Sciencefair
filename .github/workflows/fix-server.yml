name: Fix Server

on:
  workflow_dispatch:

jobs:
  fix-server:
    runs-on: ubuntu-latest
    steps:
      - name: Remove CrewAI and Fix Server
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            echo "=== 1. KILL ALL PROCESSES ON PORT 8000 (CrewAI) ==="
            fuser -k 8000/tcp 2>/dev/null || true
            pkill -f "crewai" 2>/dev/null || true
            pkill -f "fastapi" 2>/dev/null || true
            pkill -f "uvicorn" 2>/dev/null || true
            pkill -f "crew" 2>/dev/null || true
            echo "CrewAI processes killed"

            echo "=== 2. REMOVE CREWAI FILES ==="
            rm -rf /root/vps@crewai 2>/dev/null || true
            rm -rf ~/crewai* 2>/dev/null || true
            rm -rf /var/www/crewai* 2>/dev/null || true
            find / -name "crewai*" -maxdepth 5 2>/dev/null | grep -v proc || true
            echo "CrewAI files removed"

            echo "=== 3. CLEAN PM2 LIST ==="
            pm2 stop all 2>/dev/null || true
            pm2 delete all 2>/dev/null || true
            echo "PM2 cleared"

            echo "=== 4. WRITE NGINX CONFIG FOR SCIENCE FAIR PROJECT ==="
            cat > /etc/nginx/sites-available/airpurifying << 'EOF'
server {
    listen 80;
    listen [::]:80;
    server_name server.saifulinfo.com 160.25.226.152;
    location / {
        proxy_pass http://localhost:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
EOF
            # Remove all other nginx site configs
            rm -f /etc/nginx/sites-enabled/*
            ln -sf /etc/nginx/sites-available/airpurifying /etc/nginx/sites-enabled/airpurifying
            echo "Nginx configured for Science Fair project only"

            echo "=== 5. WRITE ENV FILE ==="
            cat > /var/www/airpurifying-concrete/.env << 'ENVEOF'
DATABASE_URL="postgresql://postgres.smiewgmpdbitckyjchvt:Brockvai%404200@aws-1-ap-northeast-1.pooler.supabase.com:6543/postgres?pgbouncer=true"
DIRECT_URL="postgresql://postgres.smiewgmpdbitckyjchvt:Brockvai%404200@aws-1-ap-northeast-1.pooler.supabase.com:5432/postgres"
ENVEOF
            echo ".env written"

            echo "=== 6. START SCIENCE FAIR PROJECT ==="
            cd /var/www/airpurifying-concrete/
            ls -la
            if [ -f server.js ]; then
                pm2 start server.js --name "next-app"
                pm2 save
                pm2 startup 2>/dev/null || true
                echo "Next.js started on port 3000"
            else
                echo "ERROR: server.js not found. Files:"
                ls -la
            fi

            echo "=== 7. RESTART NGINX ==="
            nginx -t 2>&1
            systemctl restart nginx
            echo "Nginx restarted"

            echo "=== 8. VERIFY ==="
            sleep 3
            pm2 list
            curl -s -o /dev/null -w "HTTP localhost:3000 = %{http_code}\n" http://localhost:3000/ || echo "Port 3000 not responding yet"
            echo "Port 8000 check:"
            ss -tlnp | grep 8000 || echo "Port 8000 is FREE (CrewAI removed)"
            echo ""
            echo "=== DONE! CrewAI removed. Science Fair project running! ==="
