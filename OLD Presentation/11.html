<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Slide 11 - Live Public Opinion</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;700;800;900&family=Hind+Siliguri:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    
    <script>
        tailwind.config = {
            theme: { 
                extend: { 
                    colors: { primary: '#0d9488', danger: '#f43f5e' }, 
                    fontFamily: { eng: ['Outfit', 'sans-serif'], bn: ['Hind Siliguri', 'sans-serif'] } 
                } 
            }
        }
    </script>
    <style>
        /* ==========================================
           1. RESET & FULLSCREEN BASE
           ========================================== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { width: 100vw; height: 100vh; overflow: hidden; background-color: #ffffff; font-family: 'Hind Siliguri', sans-serif; }
        
        .bg-canvas {
            position: absolute; inset: 0;
            background: 
                radial-gradient(circle at 100% 100%, rgba(13, 148, 136, 0.05) 0%, transparent 40%),
                radial-gradient(circle at 0% 0%, rgba(2, 132, 199, 0.03) 0%, transparent 40%), #fcfdfe;
            z-index: -1;
        }

        .slide-container { width: 100%; height: 100%; padding: 50px 80px; display: flex; flex-direction: column; position: relative; z-index: 10; }

        /* ==========================================
           2. PREMIUM LIGHT CARDS
           ========================================== */
        .premium-card { 
            background: #ffffff; border: 1px solid rgba(0,0,0,0.04); border-radius: 35px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.03); overflow: hidden; transition: all 0.3s ease; 
        }

        /* ==========================================
           3. ANIMATIONS (From your old code)
           ========================================== */
        /* Chart Pulse Animation */
        .chart-container { position: relative; display: flex; justify-content: center; align-items: center; }
        .chart-container::before {
            content: ''; position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            width: 80%; height: 80%; background: radial-gradient(circle, rgba(13,148,136,0.1) 0%, transparent 70%);
            z-index: -1; animation: pulseGlow 3s infinite;
        }
        @keyframes pulseGlow {
            0% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
            50% { transform: translate(-50%, -50%) scale(1.1); opacity: 0.9; }
            100% { transform: translate(-50%, -50%) scale(0.9); opacity: 0.5; }
        }

        /* Feed Slide In Animation */
        @keyframes slideInFeed {
            from { opacity: 0; transform: translateX(30px); }
            to { opacity: 1; transform: translateX(0); }
        }
        .feed-item { animation: slideInFeed 0.5s cubic-bezier(0.16, 1, 0.3, 1) forwards; }

        /* Custom Scrollbar */
        .custom-scroll { overflow-y: auto; scrollbar-width: thin; scrollbar-color: rgba(13,148,136,0.2) transparent; }
        .custom-scroll::-webkit-scrollbar { width: 5px; }
        .custom-scroll::-webkit-scrollbar-thumb { background: rgba(13,148,136,0.2); border-radius: 10px; }
    </style>
</head>
<body class="font-bn">

    <div class="bg-canvas"></div>

    <div class="slide-container">
        
        <div class="text-center mb-8">
            <div class="inline-flex items-center gap-2 px-4 py-1.5 rounded-full bg-primary/10 border border-primary/20 text-primary text-xs font-bold mb-3 uppercase tracking-widest font-eng">
                <span class="w-2 h-2 rounded-full bg-primary animate-pulse"></span>
                Live Voting System
            </div>
            <h1 class="text-4xl lg:text-5xl font-black text-slate-900 font-eng tracking-tight uppercase">
                PUBLIC <span class="text-transparent bg-clip-text bg-gradient-to-r from-primary to-blue-500">OPINION</span>
            </h1>
        </div>

        <div class="grid grid-cols-12 gap-8 flex-1 min-h-0">
            
            <div class="col-span-3">
                <div class="premium-card h-full p-8 flex flex-col items-center justify-center text-center relative group">
                    <h3 class="font-eng font-extrabold text-xl text-slate-800 mb-6 uppercase tracking-tight">SCAN TO VOTE</h3>
                    
                    <div class="bg-white p-4 rounded-3xl border border-slate-100 shadow-2xl mb-6 transition-transform hover:scale-105">
                        <div id="qrcode"></div>
                    </div>
                    
                    <p class="text-slate-500 text-xs flex items-center gap-2 bg-slate-50 px-4 py-2 rounded-xl border border-slate-100 font-eng tracking-wide">
                        <i data-lucide="scan-line" class="w-4 h-4 text-primary"></i> Use Mobile Camera
                    </p>
                </div>
            </div>

            <div class="col-span-6 flex flex-col gap-6">
                <div class="premium-card flex-1 p-6 relative flex flex-col items-center justify-center">
                    <div class="chart-container w-[280px] h-[280px]">
                        <canvas id="pollChart"></canvas>
                        <div class="absolute inset-0 flex flex-col items-center justify-center pointer-events-none">
                            <span class="font-eng text-[11px] text-slate-400 font-bold uppercase tracking-[0.3em] mb-1">Approval</span>
                            <span class="font-eng text-6xl font-black text-slate-900 tracking-tighter" id="winPercent">0%</span>
                        </div>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-5 h-28">
                    <div class="premium-card flex flex-col items-center justify-center border-l-[8px] border-primary bg-gradient-to-r from-primary/5 to-transparent">
                        <span class="font-eng text-5xl font-black text-slate-900" id="countYes">0</span>
                        <div class="flex items-center gap-1.5 text-primary font-eng font-bold text-xs uppercase tracking-widest mt-1">
                            <i data-lucide="thumbs-up" class="w-4 h-4"></i> Agreed
                        </div>
                    </div>
                    <div class="premium-card flex flex-col items-center justify-center border-l-[8px] border-danger bg-gradient-to-r from-danger/5 to-transparent">
                        <span class="font-eng text-5xl font-black text-slate-900" id="countNo">0</span>
                        <div class="flex items-center gap-1.5 text-danger font-eng font-bold text-xs uppercase tracking-widest mt-1">
                            <i data-lucide="thumbs-down" class="w-4 h-4"></i> Disagreed
                        </div>
                    </div>
                </div>
            </div>

            <div class="col-span-3">
                <div class="premium-card h-full flex flex-col">
                    <div class="p-5 border-b border-slate-50 flex justify-between items-center bg-slate-50/50">
                        <h3 class="font-eng font-bold text-slate-800 text-xs uppercase tracking-widest flex items-center gap-2">
                            <i data-lucide="activity" class="w-4 h-4 text-primary"></i> RECENT VOTES
                        </h3>
                        <div class="flex items-center gap-2">
                            <span class="relative flex h-2.5 w-2.5">
                              <span class="animate-ping absolute inline-flex h-full w-full rounded-full bg-green-400 opacity-75"></span>
                              <span class="relative inline-flex rounded-full h-2.5 w-2.5 bg-green-500"></span>
                            </span>
                            <span class="font-eng font-bold text-slate-500 text-xs" id="totalVoters">Total: 0</span>
                        </div>
                    </div>
                    
                    <div id="liveFeedBox" class="flex-1 custom-scroll p-4 space-y-2 relative">
                        <div class="absolute inset-0 flex flex-col items-center justify-center text-slate-400 space-y-3" id="emptyState">
                            <i data-lucide="loader-2" class="w-8 h-8 animate-spin text-primary"></i>
                            <span class="font-eng text-[11px] font-bold uppercase tracking-widest">Connecting...</span>
                        </div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <script>
        lucide.createIcons();

        // API Endpoint (Using relative path as it's in the same folder)
        const API_URL = 'vote_api.php'; 
        
        let pollChart;
        const ctx = document.getElementById('pollChart').getContext('2d');
        let previousFeedJSON = '';

        function initSystem() {
            // Chart Setup
            pollChart = new Chart(ctx, {
                type: 'doughnut',
                data: {
                    labels: ['YES', 'NO'],
                    datasets: [{
                        data: [0, 0],
                        backgroundColor: ['#0d9488', '#f43f5e'], 
                        borderWidth: 0,
                        hoverOffset: 10,
                        cutout: '82%',
                        borderRadius: 15
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    animation: { animateScale: true, animateRotate: true },
                    plugins: { legend: { display: false }, tooltip: { enabled: false } },
                    layout: { padding: 15 }
                }
            });

            // Dynamic QR Code (Automatically points to vote.php in the same directory)
            const currentUrl = window.location.href;
            // Assuming this slide might be loaded via index.php iframe, we construct the vote URL
            const baseUrl = currentUrl.substring(0, currentUrl.lastIndexOf('/'));
            const voteUrl = baseUrl + '/vote.php';

            const qrContainer = document.getElementById("qrcode");
            qrContainer.innerHTML = "";
            new QRCode(qrContainer, {
                text: voteUrl,
                width: 140, height: 140,
                colorDark : "#0f172a", colorLight : "#ffffff",
                correctLevel : QRCode.CorrectLevel.H
            });

            // Start API Polling (1 second interval like your old code)
            fetchData();
            setInterval(fetchData, 1000); 
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL + '?action=fetch&t=' + Date.now());
                const data = await response.json();
                
                if(data) {
                    updateChart(data.yes, data.no);
                    updateFeed(data.feed);
                }
            } catch (error) { 
                console.error("API Fetch Error"); 
            }
        }

        function updateChart(yes, no) {
            if(pollChart.data.datasets[0].data[0] !== yes || pollChart.data.datasets[0].data[1] !== no) {
                pollChart.data.datasets[0].data = [yes, no];
                pollChart.update();
                
                document.getElementById('countYes').innerText = yes;
                document.getElementById('countNo').innerText = no;

                const total = yes + no;
                const yesPercent = total > 0 ? Math.round((yes / total) * 100) : 0;
                document.getElementById('winPercent').innerText = yesPercent + "%";
                document.getElementById('totalVoters').innerText = "Total: " + total;
            }
        }

        function updateFeed(feedData) {
            const currentFeedJSON = JSON.stringify(feedData);
            
            if (currentFeedJSON !== previousFeedJSON) {
                if(feedData && feedData.length > 0) {
                    document.getElementById('emptyState').style.display = 'none';
                    const feedContainer = document.getElementById('liveFeedBox');
                    
                    let html = '';
                    feedData.forEach((vote) => {
                        const isYes = vote.type === 'yes';
                        const borderColor = isYes ? 'border-l-primary' : 'border-l-danger';
                        const iconColor = isYes ? 'text-primary' : 'text-danger';
                        const iconBg = isYes ? 'bg-teal-50' : 'bg-rose-50';
                        const icon = isYes ? 'check' : 'x';
                        
                        html += `
                            <div class="feed-item p-3 mb-2 rounded-r-xl bg-white border-l-[4px] ${borderColor} shadow-sm border-t border-r border-b border-slate-100 flex items-center justify-between">
                                <div class="flex items-center gap-3 overflow-hidden">
                                    <div class="w-8 h-8 rounded-full ${iconBg} flex items-center justify-center shrink-0 text-xs font-black ${iconColor} font-eng">
                                        ${vote.name.charAt(0).toUpperCase()}
                                    </div>
                                    <div class="text-slate-700 font-bold text-sm truncate font-bn">
                                        ${vote.name}
                                    </div>
                                </div>
                                <div class="${iconColor}">
                                    <i data-lucide="${icon}" class="w-4 h-4"></i>
                                </div>
                            </div>
                        `;
                    });
                    feedContainer.innerHTML = html;
                    lucide.createIcons();
                } else {
                    document.getElementById('emptyState').style.display = 'flex';
                    document.getElementById('emptyState').innerHTML = '<span class="text-xs font-eng text-slate-400 font-bold">NO VOTES YET</span>';
                }
                previousFeedJSON = currentFeedJSON;
            }
        }

        window.addEventListener('load', initSystem);
    </script>
</body>
</html>
